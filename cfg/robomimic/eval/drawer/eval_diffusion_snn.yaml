defaults:
  - _self_
hydra:
  run:
    dir: ${logdir}
_target_: agent.eval.eval_diffusion_agent.EvalDiffusionAgent

#name: ${env_name}_eval_diffusion_snn_ta${horizon_steps}_td${denoising_steps}
name: ${env_name}_evalZg_diffusion_snn_ta${horizon_steps}_td${denoising_steps}
logdir: ${oc.env:DPPO_LOG_DIR}/robomimic-eval/${name}/${now:%Y-%m-%d}_${now:%H-%M-%S}_${seed}
base_policy_path:
#robomimic_env_cfg_path: cfg/robomimic/env_meta/${env_name}.json
robomimic_env_cfg_path: cfg/robomimic/env_meta/${env_name}.json
normalization_path: ${oc.env:DPPO_DATA_DIR}/robomimic/${env_name}/20260109_spacemouse_drawer167/normalization.npz

seed: 42
device: cuda:0
env_name: drawer
obs_dim: 22
action_dim: 7
denoising_steps: 20
cond_steps: 1
horizon_steps: 4
act_steps: 4
ft_denoising_steps: 0

n_steps: 800  # each episode takes max_episode_steps / act_steps steps
render_num: 0

env:
  n_envs: 50
  name: ${env_name}
  best_reward_threshold_for_success: 1
  max_episode_steps: 800
  save_video: False
  specific:
    reward_shaping: False
  wrappers:
    robomimic_lowdim:
      normalization_path: ${normalization_path}
      low_dim_keys: ['robot0_eef_pos',
                    'robot0_eef_quat',
                    'robot0_gripper_qpos',
                    'object'] # same order of preprocessed observations
    multi_step:
      n_obs_steps: ${cond_steps}
      n_action_steps: ${act_steps}
      max_episode_steps: ${env.max_episode_steps}
      reset_within_step: True

model:
  _target_: model.diffusion.diffusion_eval.DiffusionEval
  ft_denoising_steps: ${ft_denoising_steps}
  predict_epsilon: True
  denoised_clip_value: 1.0
  randn_clip_value: 3
  #
  network_path: ${base_policy_path}
  network:
    _target_: model.diffusion.snn_diffusion.DiffusionSNN
    time_dim: 32
    mlp_dims: [2048,2048] #mlp_dims: [1024, 1024, 1024]
    cond_mlp_dims: [512, 64]
    residual_style: False
    cond_dim: ${eval:'${obs_dim} * ${cond_steps}'}
    horizon_steps: ${horizon_steps}
    action_dim: ${action_dim}
  horizon_steps: ${horizon_steps}
  obs_dim: ${obs_dim}
  action_dim: ${action_dim}
  denoising_steps: ${denoising_steps}
  device: ${device}

  ################门控新增
  latency_injection:
    enabled: True        # 评估也启用门控
    snn_T: 4             # SNN 内部微时序步数（和训练一致）
    t_min: 1.0           # τ 的范围，用于决定“开门时机”
    t_max: 3.0
    sigma0: 0.9          # 平滑度（温度），越大越平滑
    strength_max: 0.2    # 评估没有 warm-up，直接用最终强度 β
    invert: False        # ★ 早开晚收（晚开早收就设 false）
    apply_when: [ "eval" ] # 评估阶段生效（用于将来共用工具时作分支）